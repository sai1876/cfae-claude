<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>FreshHaus - Premium Healthy Food</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<style type="text/tailwindcss">
        @layer utilities {
            .orbit-path {
                border: 2px dashed rgba(217, 230, 221, 0.5); /* secondary-container with opacity */
                border-radius: 50%;
                animation: spin-slow 120s linear infinite;
            }
            .orbit-item {
                animation: spin-slow-reverse 120s linear infinite;
            }
            .float-leaf {
                animation: float 12s ease-in-out infinite;
            }
            .float-leaf-1 { animation: float 14s ease-in-out infinite 0s; }
            .float-leaf-2 { animation: float 12s ease-in-out infinite 1.5s; }
            .float-leaf-3 { animation: float 16s ease-in-out infinite 3s; }
            .float-leaf-4 { animation: float 15s ease-in-out infinite 4.5s; }
            .float-leaf-5 { animation: float 13s ease-in-out infinite 2s; }
            
            .shimmer-btn {
                position: relative;
                overflow: hidden;
            }
            .shimmer-btn::after {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 50%;
                height: 100%;
                background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
                transform: skewX(-20deg);
            }
            .shimmer-btn:hover::after {
                animation: shimmer 1.5s infinite;
            }
            .quadrant-image {
                width: 200%;
                height: 200%;
                max-width: none;
            }
            .quad-tl { transform: translate(0, 0); }
            .quad-tr { transform: translate(-50%, 0); }
            .quad-bl { transform: translate(0, -50%); }
            .quad-br { transform: translate(-50%, -50%); }

            .text-transition {
                transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
                transform: translateY(0);
                opacity: 1;
            }
            .text-transition-out {
                transform: translateY(-15px);
                opacity: 0;
                transition: transform 0.6s ease-in, opacity 0.6s ease-in;
            }
            .text-transition-start {
                transform: translateY(20px);
                opacity: 0;
                transition: none;
            }

            .bowl-anim {
                transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
            .bowl-anim-out {
                transform: rotate(10deg) scale(1.05);
                opacity: 0;
                transition: transform 0.6s ease-in, opacity 0.6s ease-in;
            }
            .bowl-anim-start {
                transform: rotate(-10deg) scale(0.95);
                opacity: 0;
                transition: none;
            }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-slow-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(8deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f8f9ff",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#131e19",
                        "inverse-primary": "#4ae176",
                        "surface-container-low": "#eff4ff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#002113",
                        "tertiary-fixed": "#6ffbbe",
                        "surface-variant": "#d9e3f6",
                        "on-primary-container": "#004b1e",
                        "on-primary-fixed-variant": "#005321",
                        "surface-container": "#e6eeff",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "outline-variant": "#bccbb9",
                        "primary-container": "#22c55e",
                        "secondary-fixed-dim": "#bdcac1",
                        "primary-fixed": "#6bff8f",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#4edea3",
                        "primary-fixed-dim": "#4ae176",
                        "on-primary": "#ffffff",
                        "tertiary": "#006c49",
                        "outline": "#6d7b6c",
                        "on-tertiary-container": "#004a31",
                        "on-secondary-fixed-variant": "#3e4943",
                        "on-surface-variant": "#3d4a3d",
                        "tertiary-container": "#28c38a",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d0dbed",
                        "on-secondary-container": "#5b6760",
                        "on-surface": "#121c2a",
                        "secondary-fixed": "#d9e6dd",
                        "secondary": "#55615a",
                        "surface-container-high": "#dee9fc",
                        "secondary-container": "#d9e6dd",
                        "primary": "#006e2f",
                        "background": "#f8f9ff",
                        "on-primary-fixed": "#002109",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-background": "#121c2a",
                        "inverse-surface": "#27313f",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "8px",
                        "margin-desktop": "auto",
                        "lg": "24px",
                        "base": "4px",
                        "margin-mobile": "20px",
                        "md": "16px",
                        "2xl": "64px",
                        "xl": "40px",
                        "max-width": "1200px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Geist"],
                        "body-md": ["Inter"],
                        "headline-xl-mobile": ["Geist"],
                        "headline-xl": ["Geist"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-xl-mobile": ["32px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-x-hidden min-h-screen flex flex-col">
<!-- TopAppBar -->

</header>
<!-- Main Hero Section -->

<!-- Background Shapes -->

<!-- Floating Elements -->
<div class="absolute top-[10%] left-[5%] text-primary/30 float-leaf-1 z-0 w-8 h-8">
<svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22L6.66 19.7C7.14 19.87 7.64 20 8.16 20C14 20 18 16 18 10C18 9.32 17.93 8.65 17.78 8H17ZM16 10C16 14.42 12.87 18 8.16 18C7.6 18 7.07 17.9 6.56 17.74L11.75 4.54C14.16 5.34 16 7.45 16 10Z"></path></svg>
</div>
<div class="absolute bottom-[20%] left-[15%] text-tertiary/20 float-leaf-3 z-0 w-12 h-12">
<svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22L6.66 19.7C7.14 19.87 7.64 20 8.16 20C14 20 18 16 18 10C18 9.32 17.93 8.65 17.78 8H17Z"></path></svg>
</div>
<div class="max-w-max-width mx-auto px-margin-mobile lg:px-margin-desktop grid grid-cols-1 md:grid-cols-2 gap-2xl items-center w-full relative z-10">
<!-- Mobile Image Priority -->
<div class="md:hidden relative w-full aspect-square max-w-[400px] mx-auto flex items-center justify-center my-sm">
<div class="absolute inset-0 bg-primary-container/10 rounded-full scale-90"></div>
<img alt="Gourmet Beef Burger" class="w-[85%] h-[85%] object-cover rounded-full z-20 relative bowl-anim" id="mobile-bowl-img" src="./images/gourmet_beef_burger.png" style="filter: drop-shadow(rgba(0, 0, 0, 0.12) 0px 20px 20px);">
<div class="absolute bottom-[10%] left-[5%] z-30 inline-flex items-center bg-primary-container text-on-primary font-headline-lg text-headline-lg px-lg py-sm rounded-xl shadow-lg text-transition" id="hero-price-mobile-floating" style="transition-delay: 0.9s;">$22.00</div>
</div>
<!-- Text Content -->
<div class="flex flex-col gap-lg z-20 items-center md:items-start text-center md:text-left order-2 md:order-1">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-on-surface leading-tight text-transition" id="hero-headline" style="transition-delay: 0.6s;">Premium <br class="hidden md:block"> Grain Bowl</h1>
<div class="flex items-center justify-center md:justify-start gap-sm mt-md mx-auto md:mx-0 thumbnail-container">
<button aria-label="Switch to Beef Burger" class="w-16 h-16 rounded-full border-2 overflow-hidden hover:scale-105 transition-all duration-300 shadow-sm cursor-pointer relative z-30 pointer-events-auto border-transparent hover:border-primary/50">
<img alt="Gourmet Beef Burger" class="w-full h-full object-cover" src="./images/gourmet_beef_burger.png">
</button>
<button aria-label="Switch to Luxury Gourmet Burger" class="w-16 h-16 rounded-full border-2 overflow-hidden hover:scale-105 transition-all duration-300 shadow-sm cursor-pointer relative z-30 pointer-events-auto border-transparent hover:border-primary/50">
<img alt="Luxury Gourmet Burger" class="w-full h-full object-cover" src="./images/luxury_gourmet_burger.png">
</button>
<button aria-label="Switch to Grain Bowl" class="w-16 h-16 rounded-full border-2 overflow-hidden hover:scale-105 transition-all duration-300 shadow-sm cursor-pointer relative z-30 pointer-events-auto border-primary">
<img alt="Premium Grain Bowl" class="w-full h-full object-cover" src="./images/premium_grain_bowl.png">
</button>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto md:mx-0 hidden md:block text-transition" id="hero-desc" style="transition-delay: 0.7s;">A vibrant, protein-packed bowl featuring roasted seasonal vegetables, chickpeas, and fresh avocado over a bed of fluffy quinoa.</p>
<div class="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-md w-full max-w-sm mt-md mx-auto md:mx-0">
<button class="flex-1 bg-primary text-on-primary font-headline-lg text-headline-lg py-[12px] px-[24px] rounded-full shadow-[0_10px_30px_rgba(31,41,55,0.04)] hover:shadow-[0_20px_40px_rgba(31,41,55,0.12)] hover:-translate-y-1 hover:scale-105 shimmer-btn transition-all duration-300 w-full flex items-center justify-center gap-sm group">
                    Order Now
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Desktop Image Presentation -->
<div class="hidden md:flex relative w-full h-[600px] items-center justify-center order-1 md:order-2">
<div class="absolute inset-0 bg-primary-container/10 rounded-full scale-[0.85] z-0"></div>
<!-- Orbiting Path -->
<div class="absolute inset-0 scale-[0.95] orbit-path z-10 flex items-center justify-center pointer-events-none">
<!-- Cheese (Top) -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-white shadow-lg orbit-item overflow-hidden border-2 border-white pointer-events-auto">
<img alt="Cheddar Cheese" class="quadrant-image quad-tl" src="./images/ingredients_sprite.png">
</div>
<!-- Lettuce (Right) -->
<div class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-white shadow-lg orbit-item overflow-hidden border-2 border-white pointer-events-auto">
<img alt="Lettuce" class="quadrant-image quad-tr" src="./images/ingredients_sprite.png">
</div>
<!-- Tomato (Bottom) -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-20 h-20 rounded-full bg-white shadow-lg orbit-item overflow-hidden border-2 border-white pointer-events-auto">
<img alt="Tomato" class="quadrant-image quad-bl" src="./images/ingredients_sprite.png">
</div>
<!-- Pickle (Left) -->
<div class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full bg-white shadow-lg orbit-item overflow-hidden border-2 border-white pointer-events-auto">
<img alt="Pickle" class="quadrant-image quad-br" src="./images/ingredients_sprite.png">
</div>
</div>
<!-- Main Product Image -->
<img alt="Gourmet Beef Burger" class="w-[75%] h-[75%] object-contain rounded-full z-20 relative bowl-anim" id="desktop-bowl-img" src="./images/gourmet_beef_burger.png" style="filter: drop-shadow(rgba(0, 0, 0, 0.15) 0px 25px 25px);">
<!-- Floating Price Tag -->
<div class="absolute left-[5%] z-30 inline-flex items-center bg-primary-container text-on-primary font-headline-lg text-headline-lg px-lg py-sm rounded-xl shadow-lg bottom-[10%] text-transition" id="hero-price-desktop" style="transition-delay: 0.8s;">$22.00</div>
<!-- Rating Tag -->
<div class="absolute bottom-[20%] right-[10%] z-30 bg-white/90 backdrop-blur-sm px-md py-sm rounded-xl shadow-[0_10px_30px_rgba(31,41,55,0.08)] animate-pulse">
<div class="flex items-center gap-xs text-secondary text-sm">
<span class="material-symbols-outlined" data-icon="star" style="font-size: 16px; color: rgb(251, 191, 36); font-variation-settings: &quot;FILL&quot; 1;">star</span>
<span class="font-label-sm font-bold">4.9</span>
</div>
</div>
</div>
</div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const bowlsData = [
            {
                title: 'Gourmet <br class="hidden md:block"> Beef Burger',
                desc: 'Experience the ultimate beef burger with melted cheddar, fresh lettuce, and vine-ripened tomatoes on a toasted brioche bun.',
                price: '$18.00',
                image: './images/gourmet_beef_burger_data.png'
            },
            {
                title: 'Crispy <br class="hidden md:block"> Chicken Burger',
                desc: 'Golden, extra-crunchy chicken breast paired with zesty slaw and house-made pickles for the perfect kick in every bite.',
                price: '$16.50',
                image: './images/crispy_chicken_burger.png'
            },
            {
                title: 'Premium <br class="hidden md:block"> Grain Bowl',
                desc: 'A vibrant, protein-packed bowl featuring roasted seasonal vegetables, chickpeas, and fresh avocado over a bed of fluffy quinoa.',
                price: '$22.00',
                image: './images/premium_grain_bowl.png'
            }
        ];

        let currentBowlIndex = 0;
        let isAnimating = false;
        
        const desktopBowl = document.getElementById('desktop-bowl-img');
        const mobileBowl = document.getElementById('mobile-bowl-img');
        const headline = document.getElementById('hero-headline');
        const desc = document.getElementById('hero-desc');
        const priceDesktop = document.getElementById('hero-price-desktop');
        const priceMobile = document.getElementById('hero-price-mobile-floating');
        const textElements = [headline, desc, priceDesktop, priceMobile].filter(Boolean);
        const thumbnails = document.querySelectorAll('.thumbnail-container button');
        
        let autoScrollTimer;

        function startAutoScroll() {
            clearInterval(autoScrollTimer);
            autoScrollTimer = setInterval(() => {
                const nextIndex = (currentBowlIndex + 1) % bowlsData.length;
                window.switchBowlToIndex(nextIndex);
            }, 8000);
        }

        window.switchBowlToIndex = function(index) {
            if (index === currentBowlIndex || isAnimating) return;
            isAnimating = true;
            
            startAutoScroll();

            currentBowlIndex = index;
            const data = bowlsData[index];

            thumbnails.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.remove('border-transparent', 'hover:border-primary/50');
                    btn.classList.add('border-primary');
                } else {
                    btn.classList.add('border-transparent', 'hover:border-primary/50');
                    btn.classList.remove('border-primary');
                }
            });

            [desktopBowl, mobileBowl].forEach(img => {
                if (!img) return;
                img.classList.remove('bowl-anim', 'bowl-anim-start');
                img.classList.add('bowl-anim-out');
            });
            
            textElements.forEach(el => {
                el.style.transitionDelay = '0s';
                el.classList.remove('text-transition', 'text-transition-start');
                el.classList.add('text-transition-out');
            });

            setTimeout(() => {
                [desktopBowl, mobileBowl].forEach(img => {
                    if (!img) return;
                    img.src = data.image;
                    img.classList.remove('bowl-anim-out');
                    img.classList.add('bowl-anim-start');
                });
                
                if(headline) headline.innerHTML = data.title;
                if(desc) desc.innerHTML = data.desc;
                if(priceDesktop) priceDesktop.innerHTML = data.price;
                if(priceMobile) priceMobile.innerHTML = data.price;
                
                textElements.forEach(el => {
                    el.classList.remove('text-transition-out');
                    el.classList.add('text-transition-start');
                });

                void desktopBowl.offsetWidth;
                
                [desktopBowl, mobileBowl].forEach(img => {
                    if (!img) return;
                    img.classList.remove('bowl-anim-start');
                    img.classList.add('bowl-anim');
                });
                
                textElements.forEach((el, i) => {
                    el.classList.remove('text-transition-start');
                    el.style.transitionDelay = `${0.6 + i * 0.1}s`;
                    el.classList.add('text-transition');
                });
                
                setTimeout(() => {
                    isAnimating = false;
                }, 1800);
                
            }, 600);
        };

        thumbnails.forEach((btn, index) => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.switchBowlToIndex(index);
            });
        });

        startAutoScroll();

        const heroMain = document.getElementById('hero-main');
        let scrollDebounceTimer;
        let touchStartX = 0;
        let touchEndX = 0;

        function handleScrollIntent(direction) {
            if (isAnimating) return;
            let nextIndex = currentBowlIndex;
            if (direction > 0) {
                nextIndex = (currentBowlIndex + 1) % bowlsData.length;
            } else if (direction < 0) {
                nextIndex = (currentBowlIndex - 1 + bowlsData.length) % bowlsData.length;
            }
            window.switchBowlToIndex(nextIndex);
        }

        if (heroMain) {
            heroMain.addEventListener('wheel', (e) => {
                if (isAnimating) return;
                clearTimeout(scrollDebounceTimer);
                scrollDebounceTimer = setTimeout(() => {
                    if (Math.abs(e.deltaY) > 30) {
                        handleScrollIntent(e.deltaY);
                    }
                }, 100);
            }, { passive: true });

            heroMain.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            heroMain.addEventListener('touchend', (e) => {
                if (isAnimating) return;
                touchEndX = e.changedTouches[0].screenX;
                const diffX = touchStartX - touchEndX;
                const threshold = 50;
                if (Math.abs(diffX) > threshold) {
                    handleScrollIntent(diffX);
                }
            }, { passive: true });
        }
    });
</script>






</body></html>
